name: dmtsibereket
description: A Flutter project for Dmtsi Bereket hymns.
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  upgrader: ^11.4.0
  package_info_plus: ^8.3.0
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  carousel_slider: ^5.0.0
  in_app_review: ^2.0.10
  intl: 0.20.2
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0
  share_plus: ^11.0.0
  collection: ^1.18.0
  shared_preferences: ^2.5.3
  flutter_markdown: ^0.7.7+1
  change_app_package_name: ^1.5.0
  in_app_update: ^4.2.2
  markdown_widget: ^2.3.2+3

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0
  
  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21 
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.png"

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/icons/
    - assets/dmtsi_bereket_logo.png
    - assets/images/
    - assets/images/singers/
    - assets/images/saints/
    - assets/images/prayers/prayer.jpg
    - assets/images/prayers/htsanat.jpg
    - assets/images/prayers/
    - assets/images/church_history/
    - assets/images/prayers/fnote_mesqel/
    - assets/images/others/
    - assets/images/home/
    - assets/images/category/

  fonts:
    - family: NotoSerifEthiopic
      fonts:
        - asset: fonts/NotoSerifEthiopic-Regular.ttf
        - asset: fonts/NotoSerifEthiopic-Bold.ttf
          weight: 700
        - asset: fonts/NotoSerifEthiopic-SemiBold.ttf
          weight: 600
        - asset: fonts/NotoSerifEthiopic-Medium.ttf
          weight: 500

flutter_native_splash:
  # እቲ 'color'ን 'image'ን ኣልጊስናዮም ኣለና።
  # ኣብ ክንድኦም፡ ነዚ ዝስዕብ 'background_image' ንጥቀም።
  # እዚ ነቲ ስእሊ ንምሉእ እቲ ስክሪን ከም ዝሽፍን ይገብሮ።
  background_image: "assets/images/others/jesus.jpg"
  background_image_dark: "assets/images/others/jesus.jpg"

  # እዚኦም፡ እቲ ስእሊ ብትኽክል ንምሉእ እቲ ስክሪን ከም ዝሽፍን የረጋግጹ
  android_12:
    image: "assets/app_logo.png" # ን Android 12 ዝኸውን ምልክት
    color: "#FFFFFF"
  
  android: true
  ios: true
  web: false