name: meadi_tsga
description: A Flutter project for meaditsega.
publish_to: 'none'

version: 2.0.1+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  upgrader: ^13.3.0
  package_info_plus: ^10.1.0
  google_fonts: ^8.1.0
  flutter_staggered_animations: ^1.1.1
  carousel_slider: ^5.1.2
  in_app_review: ^2.0.12
  intl: 0.20.2
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0
  share_plus: ^13.1.0
  collection: ^1.18.0
  shared_preferences: ^2.5.3
  flutter_markdown: ^0.7.7+1
  change_app_package_name: ^1.5.0
  in_app_update: ^4.2.5
  markdown_widget: ^2.3.2+3
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  http: ^1.2.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.jpg"
  min_sdk_android: 21 
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.jpg"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/dmtsi_bereket_logo.jpg
    - assets/images/
    - assets/images/singers/
    - assets/images/saints/
    - assets/images/prayers/prayer.jpg
    - assets/images/prayers/htsanat.jpg
    - assets/images/prayers/
    - assets/images/church_history/
    - assets/images/prayers/fnote_mesqel/
    - assets/images/others/
    - assets/images/home/
    - assets/images/category/
    - assets/

  fonts:
    - family: Nyala
      fonts:
        - asset: assets/fonts/Nyala.ttf

flutter_native_splash:
  color: "#F5F5F7"
  color_dark: "#121212"

  android_12:
    color: "#F5F5F7"
    color_dark: "#121212"
  
  android: true
  ios: true
  web: false